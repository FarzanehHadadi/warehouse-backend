basePath: /v1
definitions:
  dto.Category:
    properties:
      name:
        maxLength: 100
        minLength: 3
        type: string
    required:
    - name
    type: object
  dto.CreateManagerRequest:
    properties:
      name:
        example: John Doe
        maxLength: 100
        minLength: 3
        type: string
      phone:
        example: "+1234567890"
        maxLength: 11
        minLength: 7
        type: string
    required:
    - name
    - phone
    type: object
  dto.Department:
    properties:
      manager_id:
        type: integer
      name:
        maxLength: 100
        minLength: 1
        type: string
    type: object
  dto.DepartmentListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.Department'
        type: array
    type: object
  dto.DepartmentSummary:
    properties:
      id:
        description: Department ID
        example: 1
        type: integer
      name:
        description: Department name
        example: Engineering
        type: string
    type: object
  dto.ErrorResponse:
    properties:
      error:
        properties:
          code:
            type: string
          message:
            type: string
        type: object
    type: object
  dto.ManagerListResponse:
    properties:
      has_more:
        example: true
        type: boolean
      items:
        items:
          $ref: '#/definitions/dto.ManagerSummary'
        type: array
      limit:
        example: 20
        type: integer
      next_cursor:
        example: ""
        type: string
    type: object
  dto.ManagerSummary:
    properties:
      departments:
        items:
          $ref: '#/definitions/dto.DepartmentSummary'
        type: array
      id:
        example: 1
        type: integer
      name:
        example: John Doe
        type: string
      phone:
        example: "+1234567890"
        type: string
    type: object
  dto.SuccessAuthResponse:
    properties:
      token:
        type: string
    type: object
  dto.SuccessCategoriesResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.Category'
        type: array
    type: object
  dto.SuccessCategoryResponse:
    properties:
      data:
        $ref: '#/definitions/models.Category'
    type: object
  dto.SuccessUnitListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.Unit'
        type: array
    type: object
  dto.SuccessUnitResponse:
    properties:
      data:
        $ref: '#/definitions/models.Unit'
    type: object
  dto.Unit:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  dto.UserDto:
    properties:
      mobile:
        minLength: 11
        type: string
      password:
        maxLength: 72
        minLength: 3
        type: string
    required:
    - mobile
    - password
    type: object
  models.Category:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        minLength: 3
        type: string
      updated_at:
        type: string
    required:
    - name
    type: object
  models.Department:
    properties:
      created_at:
        type: string
      id:
        type: integer
      manager:
        $ref: '#/definitions/models.Manager'
      manager_id:
        type: integer
      name:
        maxLength: 100
        minLength: 1
        type: string
      updated_at:
        type: string
    required:
    - name
    type: object
  models.Manager:
    properties:
      created_at:
        type: string
      departments:
        items:
          $ref: '#/definitions/models.Department'
        type: array
      id:
        type: integer
      name:
        maxLength: 100
        minLength: 3
        type: string
      phone:
        maxLength: 11
        minLength: 7
        type: string
      updated_at:
        type: string
    required:
    - name
    - phone
    type: object
  models.Unit:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        minLength: 1
        type: string
      updated_at:
        type: string
    required:
    - name
    type: object
host: localhost:8080
info:
  contact: {}
  description: Warehouse Management System API
  title: Warehouse API
  version: "1.2"
paths:
  /v1/auth/login:
    post:
      consumes:
      - application/json
      description: Login to warehouse
      parameters:
      - description: enter your phone number and password to login
        in: body
        name: loginInfo
        required: true
        schema:
          $ref: '#/definitions/dto.UserDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessAuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Login
      tags:
      - Auth
  /v1/categories:
