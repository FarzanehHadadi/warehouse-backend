  /v1/managers:
    get:
      consumes:
      - application/json
      description: Retrieve managers with filtering, search, and cursor pagination
      parameters:
      - description: Global search in name, phone, email
        in: query
        name: search
        type: string
      - description: Filter by name (partial match)
        in: query
        name: name
        type: string
      - description: Filter by phone (partial match)
        in: query
        name: phone
        type: string
      - description: Created after date (YYYY-MM-DD)
        in: query
        name: created_after
        type: string
      - description: Created before date (YYYY-MM-DD)
        in: query
        name: created_from
        type: string
      - description: Status field
        in: query
        name: status
        type: string
      - description: Sort field
        enum:
        - id
        - name
        - created_at
        in: query
        name: sort_by
        type: string
      - description: Sort direction
        enum:
        - asc
        - desc
        in: query
        name: sort_order
        type: string
      - description: Cursor for next page
        in: query
        name: cursor
        type: string
      - description: Number of items per page (max 100)
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ManagerListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get Managers List
      tags:
      - Managers
    post:
      consumes:
      - application/json
      description: Create a manager
      parameters:
      - description: Manager object with updated data
        in: body
        name: Manager
        required: true
        schema:
          $ref: '#/definitions/dto.CreateManagerRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            $ref: '#/definitions/dto.ManagerSummary'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - Bearer: []
      summary: Create a manager
      tags:
      - Managers
