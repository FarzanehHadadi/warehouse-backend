basePath: /v1
definitions:
  dto.Activity:
    properties:
      action:
        type: string
      created_at:
        type: string
      description:
        type: string
      entity_id:
        type: integer
      entity_type:
        type: string
      id:
        type: integer
      user:
        $ref: '#/definitions/dto.UserSummary'
    type: object
  dto.Category:
    properties:
      name:
        maxLength: 100
        minLength: 3
        type: string
    required:
    - name
    type: object
  dto.CreateManagerRequest:
    properties:
      name:
        example: John Doe
        maxLength: 100
        minLength: 3
        type: string
      phone:
        example: "+1234567890"
        maxLength: 11
        minLength: 7
        type: string
    required:
    - name
    - phone
    type: object
  dto.CreateOrderRequest:
    properties:
      department_id:
        example: 1
        type: integer
      description:
        example: Stock intake
        type: string
      expire_date:
        example: "2026-12-31"
        format: date
        type: string
      price:
        example: 1000
        minimum: 0
        type: integer
      product_id:
        example: 1
        type: integer
      product_status:
        allOf:
        - $ref: '#/definitions/models.ProductStatus'
        enum:
        - good
        - defective
        - unknown
        example: good
      quantity:
        example: 10
        minimum: 1
        type: integer
      store_id:
        example: 1
        type: integer
      type:
        allOf:
        - $ref: '#/definitions/models.OrderType'
        enum:
        - inbound
        - outbound
        example: inbound
    required:
    - department_id
    - expire_date
    - price
    - product_id
    - product_status
    - quantity
    - store_id
    - type
    type: object
  dto.Department:
    properties:
      manager_id:
        type: integer
      name:
        maxLength: 100
        minLength: 1
        type: string
    type: object
  dto.DepartmentListResponse:
    properties:
      has_more:
        example: true
        type: boolean
      items:
        items:
          $ref: '#/definitions/models.Department'
        type: array
      limit:
        example: 20
        type: integer
      next_cursor:
        example: ""
        type: string
    type: object
  dto.DepartmentSummary:
    properties:
      id:
        description: Department ID
        example: 1
        type: integer
      name:
        description: Department name
        example: Engineering
        type: string
    type: object
  dto.ErrorResponse:
    properties:
      error:
        properties:
          code:
            type: string
          message:
            type: string
        type: object
    type: object
  dto.ManagerListResponse:
    properties:
      has_more:
        example: true
        type: boolean
      items:
        items:
          $ref: '#/definitions/dto.ManagerSummary'
        type: array
      limit:
        example: 20
        type: integer
      next_cursor:
        example: ""
        type: string
    type: object
  dto.ManagerSummary:
    properties:
      departments:
        items:
          $ref: '#/definitions/dto.DepartmentSummary'
        type: array
      id:
        example: 1
        type: integer
      name:
        example: John Doe
        type: string
      phone:
        example: "+1234567890"
        type: string
    type: object
  dto.OrderSummary:
    properties:
      department:
        $ref: '#/definitions/dto.SimpleSummary'
      department_id:
        example: 1
        type: integer
      description:
        example: Stock intake
        type: string
      expire_date:
        example: "2026-12-31"
        format: date
        type: string
      id:
        example: 1
        type: integer
      price:
        example: 1000
        type: integer
      product:
        $ref: '#/definitions/dto.SimpleSummary'
      product_id:
        example: 1
        type: integer
      product_status:
        allOf:
        - $ref: '#/definitions/models.ProductStatus'
        example: good
      quantity:
        example: 10
        type: integer
      store:
        $ref: '#/definitions/dto.SimpleSummary'
      store_id:
        example: 1
        type: integer
      type:
        allOf:
        - $ref: '#/definitions/models.OrderType'
        example: inbound
    type: object
  dto.ProductSummary:
    properties:
      category:
        $ref: '#/definitions/dto.Summary'
      category_id:
        example: 2
        type: integer
      id:
        example: 1
        type: integer
      name:
        example: product1
        type: string
      unit:
        $ref: '#/definitions/dto.Summary'
      unit_id:
        example: 3
        type: integer
      warning_threshold:
        example: 1
        type: integer
    type: object
  dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.RefreshTokenResponse:
    properties:
      refresh_token:
        type: string
      token:
        type: string
    type: object
  dto.SimpleSummary:
    properties:
      id:
        example: 1
        type: integer
      name:
        example: Product 1
        type: string
    type: object
  dto.StoreProductQuantityListResponse:
    properties:
      has_more:
        example: true
        type: boolean
      items:
        items:
          $ref: '#/definitions/models.StoreProductQuantityReport'
        type: array
      limit:
        example: 20
        type: integer
      next_cursor:
        example: ""
        type: string
    type: object
  dto.StoreSummary:
    properties:
      id:
        example: 1
        type: integer
      is_active:
        example: true
        type: boolean
      manager_name:
        example: John Doe
        type: string
      name:
        example: Store 1
        type: string
    type: object
  dto.SuccessActivityResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.Activity'
        type: array
    type: object
  dto.SuccessAuthResponse:
    properties:
      refresh_token:
        type: string
      token:
        type: string
      user:
        $ref: '#/definitions/dto.UserLoginSummary'
    type: object
  dto.SuccessCategoriesResponse:
    properties:
      has_more:
        example: true
        type: boolean
      items:
        items:
          $ref: '#/definitions/models.Category'
        type: array
      limit:
        example: 20
        type: integer
      next_cursor:
        example: ""
        type: string
    type: object
  dto.SuccessCategoryResponse:
    properties:
      data:
        $ref: '#/definitions/models.Category'
    type: object
  dto.SuccessUnitListResponse:
    properties:
      has_more:
        example: true
        type: boolean
      items:
        items:
          $ref: '#/definitions/models.Unit'
        type: array
      limit:
        example: 20
        type: integer
      next_cursor:
        example: ""
        type: string
    type: object
  dto.SuccessUnitResponse:
    properties:
      data:
        $ref: '#/definitions/models.Unit'
    type: object
  dto.Summary:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  dto.ThresholdProximityListResponse:
    properties:
      has_more:
        example: true
        type: boolean
      items:
        items:
          $ref: '#/definitions/models.ThresholdProximityReport'
        type: array
      limit:
        example: 20
        type: integer
      next_cursor:
        example: ""
        type: string
    type: object
  dto.Unit:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  dto.UpdateOrderRequest:
    properties:
      department_id:
        example: 1
        type: integer
      description:
        example: Updated note
        type: string
      expire_date:
        example: "2026-12-31"
        format: date
        type: string
      price:
        example: 500
        minimum: 0
        type: integer
      product_id:
        example: 1
        type: integer
      product_status:
        allOf:
        - $ref: '#/definitions/models.ProductStatus'
        enum:
        - good
        - defective
        - unknown
        example: defective
      quantity:
        example: 5
        minimum: 1
        type: integer
      store_id:
        example: 1
        type: integer
      type:
        allOf:
        - $ref: '#/definitions/models.OrderType'
        enum:
        - inbound
        - outbound
        example: outbound
    type: object
  dto.UserDto:
    properties:
      mobile:
        example: "09123456789"
        minLength: 11
        type: string
      password:
        example: "123"
        maxLength: 72
        minLength: 3
        type: string
    required:
    - mobile
    - password
    type: object
  dto.UserLoginSummary:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      phone:
        type: string
      username:
        type: string
    type: object
  dto.UserSummary:
    properties:
      first_name:
        type: string
      last_name:
        type: string
      phone:
        type: string
    type: object
  dto.orderListResponse:
    properties:
      has_more:
        example: true
        type: boolean
      items:
        items:
          $ref: '#/definitions/dto.OrderSummary'
        type: array
      limit:
        example: 20
        type: integer
      next_cursor:
        example: ""
        type: string
    type: object
  dto.productListResponse:
    properties:
      has_more:
        example: true
        type: boolean
      items:
        items:
          $ref: '#/definitions/dto.ProductSummary'
        type: array
      limit:
        example: 20
        type: integer
      next_cursor:
        example: ""
        type: string
    type: object
  dto.storeListResponse:
    properties:
      has_more:
        example: true
        type: boolean
      items:
        items:
          $ref: '#/definitions/dto.StoreSummary'
        type: array
      limit:
        example: 20
        type: integer
      next_cursor:
        example: ""
        type: string
    type: object
  models.Category:
    properties:
      created_at:
