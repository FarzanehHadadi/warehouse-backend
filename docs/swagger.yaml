      security:
      - ApiKeyAuth: []
      summary: Get list of categories
      tags:
      - Categories
    post:
      consumes:
      - application/json
      description: Create a category
      parameters:
      - description: Category object with updated data
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/dto.Category'
      produces:
