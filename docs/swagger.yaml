      manager_id:
        type: integer
      name:
        maxLength: 100
        minLength: 1
        type: string
      updated_at:
        type: string
    required:
    - name
    type: object
  models.Manager:
    properties:
      created_at:
        type: string
      departments:
        items:
          $ref: '#/definitions/models.Department'
