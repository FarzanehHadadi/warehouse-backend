basePath: /v1
definitions:
  dto.Category:
    properties:
      name:
        maxLength: 100
        minLength: 3
        type: string
    required:
    - name
    type: object
  dto.ErrorResponse:
    properties:
      error:
        properties:
          code:
            type: string
          message:
            type: string
        type: object
    type: object
  dto.SuccessAuthResponse:
    properties:
      token:
        type: string
    type: object
  dto.SuccessCategoriesResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.Category'
        type: array
    type: object
  dto.SuccessCategoryResponse:
    properties:
      data:
        $ref: '#/definitions/models.Category'
    type: object
  dto.SuccessUnitListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.Unit'
        type: array
    type: object
  dto.SuccessUnitResponse:
    properties:
      data:
        $ref: '#/definitions/models.Unit'
    type: object
  dto.Unit:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  dto.UserDto:
    properties:
      mobile:
        minLength: 11
        type: string
      password:
        maxLength: 72
        minLength: 3
        type: string
    required:
    - mobile
    - password
    type: object
  models.Category:
    properties:
      id:
        type: integer
      name:
        minLength: 3
        type: string
    required:
    - name
    type: object
  models.Unit:
    properties:
      id:
        type: integer
      name:
        minLength: 1
        type: string
    required:
    - name
    type: object
host: localhost:8080
info:
  contact: {}
  description: Warehouse Management System API
  title: Warehouse API
  version: "1.2"
paths:
  /v1/auth/login:
    post:
      consumes:
      - application/json
      description: Login to warehouse
      parameters:
      - description: enter your phone number and password to login
        in: body
        name: loginInfo
        required: true
        schema:
          $ref: '#/definitions/dto.UserDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessAuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Login
      tags:
      - Auth
  /v1/categories:
    get:
      consumes:
      - application/json
      description: Get list of categories
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessCategoriesResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get list of categories
      tags:
      - Categories
    post:
      consumes:
      - application/json
      description: Create a category
      parameters:
      - description: Category object with updated data
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/dto.Category'
      produces:
      - application/json
      responses:
        "200":
          description: No Content - Category successfully updated
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - Bearer: []
      summary: Create a category
      tags:
      - Categories
  /v1/categories/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a category
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - Bearer: []
      summary: Delete a category
      tags:
      - Categories
    get:
      consumes:
      - application/json
      description: Get a single category by its ID
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessCategoryResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - Bearer: []
      summary: Get category by ID
      tags:
      - Categories
    patch:
      consumes:
      - application/json
      description: Modify a category
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - description: Category object with updated data
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/dto.Category'
      produces:
      - application/json
      responses:
        "200":
          description: No Content - Category successfully updated
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Modify a category
      tags:
      - Categories
  /v1/units:
    get:
      consumes:
      - application/json
      description: Get list of units
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessUnitListResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get list of units
      tags:
      - Units
    post:
      consumes:
      - application/json
      description: Create a new unit
      parameters:
      - description: Unit Item
        in: body
        name: unit
        required: true
        schema:
          $ref: '#/definitions/dto.Unit'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessUnitResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - Bearer: []
      summary: Create a new unit
      tags:
      - Units
  /v1/units/{id}:
    delete:
      consumes:
      - application/json
      description: Delete an existing unit
      parameters:
      - description: Unit ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - Bearer: []
      summary: Delete unit
      tags:
      - Units
    get:
      consumes:
      - application/json
      description: Get a single unit by its ID
      parameters:
      - description: Unit ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SuccessUnitResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - Bearer: []
      summary: Get unit by ID
      tags:
      - Units
    patch:
      consumes:
      - application/json
      description: Update an existing unit
      parameters:
      - description: Unit ID
        in: path
        name: id
        required: true
        type: integer
      - description: Unit Item
        in: body
        name: unit
        required: true
        schema:
          $ref: '#/definitions/dto.Unit'
      produces:
      - application/json
      responses:
        "200":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - ApiKeyAuth: []
      - Bearer: []
      summary: Update an existing unit
      tags:
      - Units
securityDefinitions:
  ApiKeyAuth:
    description: Enter your API Key here
    in: header
    name: X-API-Key
    type: apiKey
  Bearer:
    description: Enter JWT with Bearer prefix
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
